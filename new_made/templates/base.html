<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Ghost Castle - A Shakespearean Tragedy">
    <title>{{ play_info.title }} - {{ play_info.subtitle }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function() {
            const langSwitch = document.createElement('button');
            langSwitch.id = 'langSwitch';
            langSwitch.className = 'lang-switch';
            langSwitch.innerHTML = '<span>{{ nav_text.language_switch }}</span>';
            langSwitch.addEventListener('click', async () => {
                const newLang = '{{ lang }}' === 'zh' ? 'en' : 'zh';
                try {
                    await fetch('/api/set-language', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lang: newLang })
                    });
                    location.reload();
                } catch (e) { console.error(e); }
            });
            document.addEventListener('DOMContentLoaded', () => {
                document.body.appendChild(langSwitch);
            });
        })();
    </script>
</head>
<body>
    <nav class="topnav">
        <a href="/" class="brand">
            <span class="brand-logo">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                    <circle cx="8" cy="8" r="3" fill="#d4a574"/>
                    <circle cx="24" cy="8" r="3" fill="#d4a574"/>
                    <circle cx="16" cy="24" r="4" fill="#d4a574"/>
                    <line x1="10" y1="9" x2="22" y2="9" stroke="#d4a574" stroke-width="1.5" opacity="0.6"/>
                    <line x1="11" y1="11" x2="21" y2="20" stroke="#d4a574" stroke-width="1.5" opacity="0.6"/>
                </svg>
            </span>
            <span class="brand-name">GHOST CASTLE</span>
            <span class="cn">幽灵城堡</span>
        </a>
        
        <div class="tabs">
            <a href="/" class="tab-btn {{ 'active' if request.path == '/' else '' }}">
                <span class="t-main">{{ nav_text.home }}</span>
                <span class="t-sub">{{ nav_text.home_sub }}</span>
            </a>
            <a href="/characters" class="tab-btn {{ 'active' if request.path == '/characters' else '' }}">
                <span class="t-main">{{ nav_text.characters }}</span>
                <span class="t-sub">{{ nav_text.characters_sub }}</span>
            </a>
        </div>
    </nav>
    
    <main>{% block content %}{% endblock %}</main>
    
    <footer>
        <p>{{ play_info.footer }}</p>
    </footer>
</body>
</html>
